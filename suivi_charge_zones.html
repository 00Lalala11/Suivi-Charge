<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ Suivi de Charge - Zones</title>
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #13132a;
    --card: #1a1a35;
    --border: #2a2a50;
    --orange: #ff8c00;
    --green: #00e676;
    --red: #ff3d3d;
    --yellow: #ffd700;
    --blue-r: #4fc3f7;
    --blue-f: #b39ddb;
    --text: #e0e0f0;
    --muted: #7070a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 30px;
  }

  .header {
    background: linear-gradient(135deg, #0d0d1a 0%, #1a1040 100%);
    border-bottom: 2px solid var(--orange);
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(255,140,0,0.15);
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--yellow);
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .legend span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 10px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .stat-box {
    text-align: center;
    padding: 6px 4px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
  }

  .stat-box .num { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-box .label { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; margin-top: 2px; }
  .stat-box.orange .num { color: var(--orange); }
  .stat-box.green .num { color: var(--green); }
  .stat-box.red .num { color: var(--red); }

  /* Zone title */
  .zone-title {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 6px;
    margin-top: 6px;
  }

  .zone-title h2 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .zone-title.interieur h2 { color: #81d4fa; }
  .zone-title.exterieur h2 { color: #a5d6a7; }

  .zone-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .zone-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .zone-title.interieur .zone-badge { background: rgba(129,212,250,0.15); color: #81d4fa; border: 1px solid rgba(129,212,250,0.3); }
  .zone-title.exterieur .zone-badge { background: rgba(165,214,167,0.15); color: #a5d6a7; border: 1px solid rgba(165,214,167,0.3); }

  .spots {
    padding: 4px 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .spot {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .spot.charging { border-color: var(--orange); box-shadow: 0 0 10px rgba(255,140,0,0.15); }
  .spot.done     { border-color: var(--green);  box-shadow: 0 0 10px rgba(0,230,118,0.12); }
  .spot.free     { border-color: var(--border); }

  .spot-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    user-select: none;
  }

  .spot-num {
    font-family: 'Courier New', monospace;
    font-size: 17px;
    font-weight: 700;
    color: #ffffff;
    min-width: 28px;
  }

  .brand { font-size: 15px; font-weight: 700; letter-spacing: 1px; flex: 1; }
  .brand.renault { color: var(--blue-r); }
  .brand.ford    { color: var(--blue-f); }

  .status-pill {
    font-size: 13px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .status-pill.free     { background: rgba(255,61,61,0.15);  color: var(--red);    border: 1px solid rgba(255,61,61,0.3); }
  .status-pill.charging { background: rgba(255,140,0,0.15); color: var(--orange); border: 1px solid rgba(255,140,0,0.3); }
  .status-pill.done     { background: rgba(0,230,118,0.12); color: var(--green);  border: 1px solid rgba(0,230,118,0.3); }

  .spot-body {
    display: none;
    padding: 0 12px 10px;
    gap: 8px;
    flex-direction: column;
  }

  .spot.active .spot-body { display: flex; }

  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .info-box {
    background: var(--surface);
    border-radius: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
  }

  .info-box .ilabel {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .info-box .ival {
    font-family: 'Courier New', monospace;
    font-size: 18px;
    color: var(--text);
    font-weight: 600;
  }

  .info-box .ival.orange { color: var(--orange); }
  .info-box .ival.green  { color: var(--green); }

  .btn-plug {
    background: var(--orange);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }

  .btn-plug:active { background: var(--yellow); }

  .btn-unplug {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }

  .btn-unplug:active { background: rgba(255,61,61,0.15); }

  .progress-wrap {
    background: var(--surface);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-bar {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--orange), var(--yellow));
  }

  .progress-bar.done { background: linear-gradient(90deg, var(--green), #69f0ae); }

  .progress-label {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    text-align: right;
    margin-top: 4px;
  }

  .toggle-icon {
    font-size: 11px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .spot.active .toggle-icon { transform: rotate(180deg); }

  .brand-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    padding: 6px 10px;
    outline: none;
    width: 100%;
    -webkit-appearance: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Suivi de Charge</h1>
  <div class="legend">
    <span>🟠 En charge</span>
    <span>🟢 Chargée</span>
    <span>🔴 Libre</span>
    <span>R = 6h &nbsp;|&nbsp; Ford = 3h</span>
  </div>
</div>

<div class="stats">
  <div class="stat-box orange">
    <div class="num" id="stat-charging">0</div>
    <div class="label">EN CHARGE</div>
  </div>
  <div class="stat-box green">
    <div class="num" id="stat-done">0</div>
    <div class="label">CHARGÉES</div>
  </div>
  <div class="stat-box red">
    <div class="num" id="stat-free">8</div>
    <div class="label">LIBRES</div>
  </div>
</div>

<!-- Zone Entrepôt intérieur -->
<div class="zone-title interieur">
  <h2>🏭 Entrepôt intérieur</h2>
  <div class="zone-line"></div>
  <span class="zone-badge">3 places</span>
</div>
<div class="spots" id="spots-interieur"></div>

<!-- Zone Extérieurs -->
<div class="zone-title exterieur">
  <h2>🌿 Extérieurs</h2>
  <div class="zone-line"></div>
  <span class="zone-badge">5 places</span>
</div>
<div class="spots" id="spots-exterieur"></div>

<script>
const DURATION = { Renault: 6, Ford: 3 };

const ZONES = [
  {
    key: 'interieur',
    label: 'Entrepôt intérieur',
    count: 3,
    defaultBrand: 'Renault'
  },
  {
    key: 'exterieur',
    label: 'Extérieurs',
    count: 5,
    defaultBrand: 'Renault'
  }
];

function loadState() {
  try {
    const s = localStorage.getItem('chargeStateZones');
    if (s) return JSON.parse(s);
  } catch(e) {}
  try {
    const s = sessionStorage.getItem('chargeStateZones');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return null;
}

let state = loadState();
if (!state) {
  state = {};
  ZONES.forEach(zone => {
    state[zone.key] = Array.from({ length: zone.count }, (_, i) => ({
      id: i + 1,
      brand: zone.defaultBrand,
      startTime: null
    }));
  });
}

function saveState() {
  const data = JSON.stringify(state);
  try { localStorage.setItem('chargeStateZones', data); } catch(e) {}
  try { sessionStorage.setItem('chargeStateZones', data); } catch(e) {}
}

function pad(n) { return String(n).padStart(2, '0'); }
function formatTime(date) { return `${pad(date.getHours())}:${pad(date.getMinutes())}`; }

function formatRemaining(ms) {
  if (ms <= 0) return "✅ Prête";
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h > 0 ? `${h}h ${pad(m)}min` : `${m} min`;
}

function getStatus(spot) {
  if (!spot.startTime) return 'free';
  const now = Date.now();
  const start = new Date(spot.startTime).getTime();
  const dur = (DURATION[spot.brand] || 6) * 3600000;
  return now >= start + dur ? 'done' : 'charging';
}

function getProgress(spot) {
  if (!spot.startTime) return 0;
  const now = Date.now();
  const start = new Date(spot.startTime).getTime();
  const dur = (DURATION[spot.brand] || 6) * 3600000;
  return Math.min(100, Math.round((now - start) / dur * 100));
}

function getEndTime(spot) {
  if (!spot.startTime) return null;
  return new Date(new Date(spot.startTime).getTime() + (DURATION[spot.brand] || 6) * 3600000);
}

function renderZone(zoneKey) {
  const spots = state[zoneKey];
  const container = document.getElementById(`spots-${zoneKey}`);
  container.innerHTML = '';

  spots.forEach((spot, idx) => {
    const status = getStatus(spot);
    const div = document.createElement('div');
    div.className = `spot ${status}`;
    div.id = `spot-${zoneKey}-${spot.id}`;

    const statusLabel = status === 'free' ? '🔴 Libre' : status === 'charging' ? '🟠 En charge' : '🟢 Chargée';
    const brandClass = spot.brand === 'Ford' ? 'ford' : 'renault';
    const endTime = getEndTime(spot);
    const remaining = endTime ? formatRemaining(endTime.getTime() - Date.now()) : '—';
    const progress = getProgress(spot);
    const durLabel = spot.brand === 'Ford' ? '(~3h)' : '(6h)';

    div.innerHTML = `
      <div class="spot-header" onclick="toggleSpot('${zoneKey}', ${idx})">
        <span class="spot-num">P${pad(spot.id)}</span>
        <span class="brand ${brandClass}">${spot.brand} <span style="color:#fff;font-weight:400;font-size:12px;">${durLabel}</span></span>
        <span class="status-pill ${status}">${statusLabel}</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="spot-body">
        <select class="brand-select" onchange="changeBrand('${zoneKey}', ${idx}, this.value)">
          <option ${spot.brand==='Renault'?'selected':''}>Renault</option>
          <option ${spot.brand==='Ford'?'selected':''}>Ford</option>
        </select>
        ${status !== 'free' ? `
        <div class="time-row">
          <div class="info-box">
            <div class="ilabel">Branché à</div>
            <div class="ival orange">${formatTime(new Date(spot.startTime))}</div>
          </div>
          <div class="info-box">
            <div class="ilabel">Fin prévue</div>
            <div class="ival green">${endTime ? formatTime(endTime) : '—'}</div>
          </div>
        </div>
        <div class="info-box">
          <div class="ilabel">Temps restant</div>
          <div class="ival ${status==='done'?'green':'orange'}">${remaining}</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar ${status==='done'?'done':''}" style="width:${progress}%"></div>
        </div>
        <p class="progress-label">${progress}% chargé</p>
        <button class="btn-unplug" onclick="unplug('${zoneKey}', ${idx})">🔌 Débrancher</button>
        ` : `
        <button class="btn-plug" onclick="plug('${zoneKey}', ${idx})">⚡ BRANCHER MAINTENANT</button>
        `}
      </div>
    `;
    container.appendChild(div);
  });
}

function renderAll() {
  ZONES.forEach(z => renderZone(z.key));
  updateStats();
}

function toggleSpot(zoneKey, idx) {
  const el = document.getElementById(`spot-${zoneKey}-${state[zoneKey][idx].id}`);
  el.classList.toggle('active');
}

function plug(zoneKey, idx) {
  state[zoneKey][idx].startTime = new Date().toISOString();
  saveState();
  renderAll();
  setTimeout(() => {
    const el = document.getElementById(`spot-${zoneKey}-${state[zoneKey][idx].id}`);
    if (el) el.classList.add('active');
  }, 10);
}

function unplug(zoneKey, idx) {
  state[zoneKey][idx].startTime = null;
  saveState();
  renderAll();
}

function changeBrand(zoneKey, idx, brand) {
  state[zoneKey][idx].brand = brand;
  saveState();
  renderAll();
  setTimeout(() => {
    const el = document.getElementById(`spot-${zoneKey}-${state[zoneKey][idx].id}`);
    if (el) el.classList.add('active');
  }, 10);
}

function updateStats() {
  let charging = 0, done = 0, free = 0;
  ZONES.forEach(z => {
    state[z.key].forEach(s => {
      const st = getStatus(s);
      if (st === 'charging') charging++;
      else if (st === 'done') done++;
      else free++;
    });
  });
  document.getElementById('stat-charging').textContent = charging;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-free').textContent = free;
}

setInterval(renderAll, 30000);
renderAll();
</script>
</body>
</html>
